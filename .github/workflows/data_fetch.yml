name: Daily Data Fetch

on:
  schedule:
    - cron: '0 12 * * *' # Runs daily (you can adjust this)
  workflow_dispatch: # Allows you to manually click "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission to allow the bot to push code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so git pull/rebase works cleanly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Run Data Fetcher Script
        run: python data_fetcher.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add *.csv
          
          # Check if there are staged changes
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "Automated daily CSV data append"
            
            # THE FIX: Pull any online changes before pushing to avoid conflicts
            git pull --rebase origin main
            
            git push
          fi
