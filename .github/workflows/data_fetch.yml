name: Daily Financial Data Fetch

on:
  schedule:
    # Runs automatically every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Allows pushing changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Extraction Script
        run: python update_data.py

      - name: Commit and Push CSV Updates
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.csv

          # Check if there are staged changes
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "Automated daily CSV data append"
            git push
          fi
