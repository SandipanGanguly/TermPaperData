name: Daily Data Fetch and Analysis

on:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 PM UTC (5:30 PM IST)
  workflow_dispatch: 

jobs:
  fetch_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Run Data Fetcher Script
        run: python update_data.py

      - name: Commit and Push CSV changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add *.csv
          
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "Automated daily CSV data append"
            git pull --rebase origin main
            git push
          fi

  run_analysis:
    needs: fetch_and_commit # This ensures it runs strictly after the fetch
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy 

      - name: Run Timezone Alignment and Correlation
        run: python analyze_correlation.py

      - name: Commit and Push Analysis Results
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add correlation_results.txt
          
          if git diff --cached --quiet; then
            echo "No new analysis results to commit"
          else
            git commit -m "Updated daily correlation analysis"
            git pull --rebase origin main
            git push
          fi
